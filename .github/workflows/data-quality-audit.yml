name: Data quality audit

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: night-radar-data-quality-audit
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run production audit and retention
        id: audit
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TARGET_URL: ${{ vars.NIGHT_RADAR_URL || 'https://night-radar.vercel.app' }}
        run: |
          test -n "$CRON_SECRET"
          response_file="$(mktemp)"
          status="$(curl --silent --show-error \
            --max-time 90 \
            --output "$response_file" \
            --write-out '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$TARGET_URL/api/cron/audit")"
          cat "$response_file"
          {
            echo 'response<<EOF'
            head -c 12000 "$response_file"
            echo
            echo EOF
          } >> "$GITHUB_OUTPUT"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "データ品質監査がHTTP $statusで失敗しました。" >&2
            exit 1
          fi

      - name: Record audit failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RESPONSE: ${{ steps.audit.outputs.response }}
        run: |
          title='[Night Radar] データ品質監査異常'
          body_file="$(mktemp)"
          printf '本番データ監査で異常を検知しました。\n\n- 実行: %s\n- URL: %s/actions/runs/%s\n\n```json\n%s\n```\n' \
            "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            "$GITHUB_RUN_ID" \
            "${RESPONSE:-応答本文なし}" > "$body_file"
          number="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$number" ]; then
            gh issue comment "$number" --body-file "$body_file"
          else
            gh issue create --title "$title" --body-file "$body_file"
          fi

      - name: Close recovered audit alert
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title='[Night Radar] データ品質監査異常'
          number="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$number" ]; then
            gh issue close "$number" --comment 'データ品質監査の正常復帰を確認しました。'
          fi
