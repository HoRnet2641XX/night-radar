<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <title>通信を確認してください | ナイトレーダー</title>
    <style>
      :root { color-scheme: dark; font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100svh; display: grid; place-items: center; padding: 24px; background: #07111f; color: #eef3f8; }
      main { width: min(100%, 420px); padding: 28px; border: 1px solid #243346; background: #0b1727; }
      small { color: #f06457; font-weight: 700; }
      h1 { margin: 10px 0 8px; font-size: 24px; line-height: 1.4; }
      p { margin: 0; color: #a8b4c4; font-size: 14px; line-height: 1.8; }
      button { width: 100%; margin-top: 22px; border: 1px solid #f4776c; padding: 13px 16px; background: #f06457; color: #160806; font: inherit; font-weight: 800; cursor: pointer; }
      button:focus-visible { outline: 3px solid #f6b0a9; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <small>ナイトレーダー</small>
      <h1>通信状態を確認してください</h1>
      <p>最新のBBSと店舗情報はオンラインで取得します。接続が戻ったら、もう一度読み込んでください。</p>
      <button type="button" onclick="location.reload()">再読み込み</button>
    </main>
    <script>
      window.addEventListener('online', function () {
        location.reload()
      })
    </script>
  </body>
</html>
